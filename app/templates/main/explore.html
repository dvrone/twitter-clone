{% extends "base.html" %}
{% block title %}Explore{% endblock %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4">Explore</h2>
            {% if tweets %}
                {% for tweet in tweets %}
                    {% include 'main/_tweet_card.html' %}
                {% endfor %}
            {% else %}
                <p class="text-muted">No tweets yet.</p>
            {% endif %}
        </div>
    </div>
{% endblock %}
